name: Deploy Party Game to GitHub Pages

on:
  push:
    branches: ["main"] # Change to "master" if your default branch is named master
  workflow_dispatch: # Allows you to trigger the build manually from GitHub UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to prevent race conditions
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Google Sheet URL from Secrets
        run: |
          # Replaces the placeholder inside your script with your actual secret link.
          # If your main HTML file is named something other than index.html, change it below.
          sed -i "s|__GOOGLE_SHEET_CSV_URL__|${{ secrets.MY_GOOGLE_SHEET_URL }}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the root directory containing your index.html
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
