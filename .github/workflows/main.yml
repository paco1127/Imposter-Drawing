name: Deploy Party Game to GitHub Pages

on:
  push:
    branches: ["main"] # Change to "master" if your default branch uses that name instead
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab

# Sets necessary permissions for the GITHUB_TOKEN to allow GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevents race conditions by ensuring only one deployment runs at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Google Sheet URL from Secrets
        env:
          SECRET_URL: ${{ secrets.MY_GOOGLE_SHEET_URL }}
        run: |
          python3 -c "
          import os
          file_path = 'index.html'
          
          # Read original content with UTF-8 encoding to support Chinese characters safely
          with open(file_path, 'r', encoding='utf-8') as f:
              content = f.read()
          
          # Use strict literal replacement to ignore special characters like '&'
          updated_content = content.replace('__GOOGLE_SHEET_CSV_URL__', os.environ['SECRET_URL'])
          
          # Write the updated file back to disk
          with open(file_path, 'w', encoding='utf-8') as f:
              f.write(updated_content)
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Uploads the entire root directory containing your newly updated index.html
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
